<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ansari Sabjiwala Home Delivery | Fresh Vegetables</title>

<style>
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  text-align:left;
  border-bottom:1px solid #ddd;
}

th{
  background:#2e7d32;
  color:#fff;
  font-weight:bold;
  text-transform:uppercase;
}

tr:hover{
  background:#f1f1f1;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f6f6f6;
}

.header{
  background:#2e7d32;
  color:#fff;
  padding:18px;
  text-align:center;
}

.header h1{
  margin:0;
  font-size:24px;
}

.header p{
  margin:6px 0 0;
  font-size:14px;
}

.section{
  padding:12px;
  font-size:18px;
  font-weight:bold;
}

.card{
  background:#fff;
  margin:12px;
  padding:12px;
  border-radius:8px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.btn{
  display:block;
  margin:15px;
  background:#25D366;
  color:#fff;
  text-align:center;
  padding:14px;
  border-radius:30px;
  text-decoration:none;
  font-size:16px;
  font-weight:bold;
  border:none;
  width:calc(100% - 30px);
  cursor:pointer;
}

.footer{
  text-align:center;
  font-size:13px;
  color:#555;
  margin:12px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🥬 Ansari Sabjiwala Home Delivery</h1>
  <p>Fresh Sabzi • Local Delivery</p>
  <p><small>Powered by ANS Digital Solutions</small></p>
</div>

<div class="section">🧺 Aaj ki Sabzi (Today’s Rate)</div>

<div class="card">
  <table id="rateTable">
    <thead>
      <tr>
        <th>Item</th>
        <th>Price</th>
        <th>Unit</th>
        <th>Qty</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<div style="text-align:right; padding:10px; font-weight:bold; font-size:18px;">
  Total: ₹<span id="totalAmount">0</span>
</div>

<button class="btn" onclick="sendOrder()">
  📲 WhatsApp par Order karein
</button>

<div class="footer">
  <p>Daily fresh sabzi • Limited stock</p>
</div>

<script>
let products = [];

fetch("https://opensheet.elk.sh/1Yz6pWhhrMg97p_YadUTUBvJIEwLJdg_cbhIuAGvZhv8/Sheet1")
.then(res => res.json())
.then(data => {
  let tbody = document.querySelector("#rateTable tbody");
  tbody.innerHTML = "";

  products = data;

  products.forEach((item, index) => {
    let row = `
      <tr>
        <td>${item["A Column"] || ""}</td>
        <td>₹${item["B Column"] || 0}</td>
        <td>${item["C Column"] || ""}</td>
        <td>
          <input type="number"
                 min="0"
                 value="0"
                 onchange="calculateTotal()"
                 data-index="${index}"
                 style="width:60px; padding:4px;">
        </td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
})
.catch(error => {
  console.error("Error loading sheet data:", error);
});

function calculateTotal() {
  let total = 0;
  let qtyInputs = document.querySelectorAll("input[type='number']");

  qtyInputs.forEach(input => {
    let qty = parseInt(input.value) || 0;
    let index = input.getAttribute("data-index");
    let price = parseFloat(products[index]["B Column"]) || 0;
    total += qty * price;
  });

  document.getElementById("totalAmount").innerText = total;
}

function sendOrder() {
  let message = "🛒 Order Details:\n\n";
  let qtyInputs = document.querySelectorAll("input[type='number']");
  let total = 0;

  qtyInputs.forEach(input => {
    let qty = parseInt(input.value) || 0;
    let index = input.getAttribute("data-index");

    if (qty > 0) {
      let itemName = products[index]["A Column"];
      let price = parseFloat(products[index]["B Column"]) || 0;
      let unit = products[index]["C Column"];
      let itemTotal = qty * price;
      total += itemTotal;

      message += `${itemName} - ${qty} ${unit} = ₹${itemTotal}\n`;
    }
  });

  if (total === 0) {
    alert("Please select at least one item.");
    return;
  }

  message += `\nTotal Amount: ₹${total}`;

  let phoneNumber = "919748016880";
  let whatsappURL = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
  window.open(whatsappURL, "_blank");
}
</script>

</body>
</html>
